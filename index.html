<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcolatore Poolish</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 20px;
      background: white;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input, select, button {
      width: 100%;
      font-size: 18px;
      padding: 12px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      background: black;
      color: white;
      border: none;
      margin-top: 20px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      font-size: 18px;
      line-height: 1.6;
    }

    .highlight {
      font-weight: bold;
      color: #c0392b;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Calcolatore Poolish</h1>

  <label>Farina impasto (g)</label>
  <input type="number" id="farina" value="2000">

  <label>Percentuale Poolish (%)</label>
  <input type="number" id="poolishPerc" value="50">

  <label>Idratazione totale (%)</label>
  <input type="number" id="idratazione" value="60">

  <button onclick="calcola()">Calcola</button>

  <div class="result" id="risultato"></div>
</div>

<script>
function calcola() {

  let farina = parseFloat(document.getElementById("farina").value);
  let poolishPerc = parseFloat(document.getElementById("poolishPerc").value);
  let idratazione = parseFloat(document.getElementById("idratazione").value);

  let farinaPoolish = farina * (poolishPerc / 100);
  let acquaPoolish = farinaPoolish; // 100%

  let farinaImpasto = farina - farinaPoolish;

  let acquaTotale = farina * (idratazione / 100);
  let acquaImpasto = acquaTotale - acquaPoolish;

  let lievito = farina * 0.01;
  let sale = farina * 0.02;

  document.getElementById("risultato").innerHTML = `
    <div><b>POOLISH</b></div>
    Farina: <span class="highlight">${farinaPoolish.toFixed(0)} g</span><br>
    Acqua: <span class="highlight">${acquaPoolish.toFixed(0)} g</span><br><br>

    <div><b>IMPASTO</b></div>
    Farina: ${farinaImpasto.toFixed(0)} g<br>
    Acqua: ${acquaImpasto.toFixed(0)} g<br>
    Lievito: ${lievito.toFixed(0)} g<br>
    Sale: ${sale.toFixed(0)} g<br><br>

    <div><b>IDRATAZIONE</b>: ${idratazione}%</div>
  `;
}
</script>

</body>
</html>
